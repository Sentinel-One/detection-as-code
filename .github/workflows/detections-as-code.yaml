---
name: Detections as Code

on:
  push:
    branches:
      - main
    paths:
      - 'detections/**'
  pull_request:
    paths:
      - 'detections/**'

# Least-privilege default GITHUB_TOKEN scopes. Jobs override as needed;
# this default protects any future job added without its own `permissions:`
# block from silently inheriting the repo's (often write-capable) defaults.
# Auth to the DAC API uses a static secret (no OIDC), so `id-token: write`
# is intentionally not granted.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  diff:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check --no-deps --require-hashes --only-binary=:all: \
            -r requirements.txt

      - name: Diff detections
        env:
          API_TOKEN: ${{ secrets.DAC_API_TOKEN }}
          MGMT_URI: ${{ vars.MGMT_URI }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PULL_REQUEST: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python detection-as-code.py diff

  apply:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check --no-deps --require-hashes --only-binary=:all: \
            -r requirements.txt

      - name: Apply detections
        env:
          API_TOKEN: ${{ secrets.DAC_API_TOKEN }}
          MGMT_URI: ${{ vars.MGMT_URI }}
          HEAD_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python detection-as-code.py apply
