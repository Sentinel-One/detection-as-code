id: rule1
name: Suspicious PowerShell Download Cradle
description: Detects PowerShell commands commonly used to download and execute remote payloads
severity: High
expirationMode: Permanent
queryType: events
s1ql: 'event.type = "Process Creation" AND src.process.name = "powershell.exe" AND src.process.cmdline contains "DownloadString"'
status: Active
