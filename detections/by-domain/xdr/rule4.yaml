id: rule4
name: Suspicious PowerShell Execution
description: Detects suspicious PowerShell command execution with encoded commands or bypass flags
severity: High
expirationMode: Permanent
queryType: events
s1ql: 'EventType = "Process" AND ProcessName = "powershell.exe" AND (ProcessCommandLine contains "-enc" OR ProcessCommandLine contains "-EncodedCommand" OR ProcessCommandLine contains "-ExecutionPolicy Bypass")'
queryLang: "2.0"
status: Active